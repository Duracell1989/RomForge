sonar.projectKey=romforge
sonar.projectName=RomForge
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests
sonar.language=cs

sonar.host.url=http://localhost:9000
sonar.token=${SONAR_TOKEN}

sonar.exclusions=artifacts/**,**/bin/**,**/obj/**,**/*.g.cs
sonar.test.inclusions=tests/**

# Coverage reports are generated by: make coverage
sonar.cs.cobertura.reportsPaths=artifacts/coverage/**/coverage.cobertura.xml
